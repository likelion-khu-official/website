services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-stage
      - backend-prod
    restart: unless-stopped

  backend-stage:
    image: ghcr.io/likelion-khu-official/website/backend:${BACKEND_TAG:-stage-latest}
    ports:
      - "8081:8080"
    env_file:
      - .env.stage
    volumes:
      - ./data/stage.db:/app/data/stage.db
    restart: on-failure:5

  backend-prod:
    image: ghcr.io/likelion-khu-official/website/backend:${BACKEND_TAG:-prod-latest}
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    volumes:
      - ./data/prod.db:/app/data/prod.db
    restart: on-failure:5
