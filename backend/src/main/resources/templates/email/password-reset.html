<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 재설정</title>
</head>
<body style="font-family: 'Apple SD Gothic Neo', sans-serif; line-height: 1.6; color: #222;">
    <h2>비밀번호 재설정</h2>
    <p>비밀번호 재설정을 요청하셨어요. 아래 링크에서 새 비밀번호를 설정해주세요.</p>
    <p>
        <a th:href="${resetUrl}" th:text="${resetUrl}"
           style="display:inline-block; padding:10px 16px; background:#111; color:#fff; text-decoration:none; border-radius:6px;">
            비밀번호 재설정 링크
        </a>
    </p>
    <p>이 링크는 <strong th:text="${expiresAt}">만료 시각</strong>까지만 유효해요.</p>
    <p style="color:#888; font-size:12px;">본인이 요청하지 않았다면 이 메일을 무시해주세요. 비밀번호는 바뀌지 않아요.</p>
</body>
</html>
