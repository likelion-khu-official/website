spring:
  datasource:
    url: "jdbc:sqlite::memory:"
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

jwt:
  secret: test-secret-key-for-ci-must-be-at-least-32-characters-long
  access-expiration: 900000
  refresh-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health
