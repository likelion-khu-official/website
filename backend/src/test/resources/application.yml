spring:
  datasource:
    url: "jdbc:sqlite::memory:"
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

  # 테스트는 각 클래스마다 격리된 :memory: DB를 create-drop으로 즉시 만든다(#133 이전부터의 방식) —
  # Flyway가 classpath에 있다는 이유만으로 자동 실행되면 V1__baseline.sql이 먼저 테이블을 만들고
  # 그다음 create-drop이 또 만들려다 "table already exists"로 충돌한다.
  flyway:
    enabled: false

  mail:
    host: localhost
    port: 3025
    username: test
    password: test
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: test-secret-key-for-ci-must-be-at-least-32-characters-long
  access-expiration: 900000
  refresh-expiration: 604800000

admin:
  lockout:
    max-attempts: 5
    duration-minutes: 15
  seed:
    super-admins:

app:
  frontend-base-url: https://admin.likelion-khu.com
  public-site-url: https://dev.likelion-khu.com
  cookie-secure: true

oci-storage:
  endpoint: https://test.compat.objectstorage.ap-tokyo-1.oraclecloud.com
  region: ap-tokyo-1
  access-key: test-key
  secret-key: test-secret
  bucket: test-bucket
  public-url: https://test.objectstorage.ap-tokyo-1.oraclecloud.com/n/test/b/test-bucket/o

mail-sender:
  from: noreply@likelion-khu.com

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    mail:
      enabled: false
