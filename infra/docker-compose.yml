services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped

  backend-stage:
    image: ghcr.io/likelion-khu-official/website/backend:${STAGE_TAG:-stage-latest}
    ports:
      - "8081:8080"
    env_file:
      - .env.stage
    environment:
      - LOG_FILE_PATH=/app/logs/${STAGE_TAG:-stage-latest}.log
    volumes:
      - ./data:/app/data
      - ./logs/stage:/app/logs
    restart: unless-stopped

  backend-prod:
    image: ghcr.io/likelion-khu-official/website/backend:${PROD_TAG:-prod-latest}
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    environment:
      - LOG_FILE_PATH=/app/logs/${PROD_TAG:-prod-latest}.log
    volumes:
      - ./data:/app/data
      - ./logs/prod:/app/logs
    restart: unless-stopped
