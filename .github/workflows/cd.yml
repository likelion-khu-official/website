name: CD

on:
  push:
    branches: [dev, main]
    paths:
      - 'backend/**'
      - 'shared/**'
  workflow_dispatch:
    inputs:
      environment:
        description: '배포 환경 (stage / prod)'
        required: true
        default: 'stage'
        type: choice
        options: [stage, prod]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 환경 설정
        id: config
        run: |
          # workflow_dispatch 수동 실행 시 input 우선, push 시 브랜치로 판별
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref_name }}" == "main" ]; then
            ENV="prod"
          else
            ENV="stage"
          fi

          if [ "$ENV" == "prod" ]; then
            echo "env=prod"              >> $GITHUB_OUTPUT
            echo "tag_prefix=prod"       >> $GITHUB_OUTPUT
            echo "service=backend-prod"  >> $GITHUB_OUTPUT
            echo "port=8080"             >> $GITHUB_OUTPUT
          else
            echo "env=stage"             >> $GITHUB_OUTPUT
            echo "tag_prefix=stage"      >> $GITHUB_OUTPUT
            echo "service=backend-stage" >> $GITHUB_OUTPUT
            echo "port=8081"             >> $GITHUB_OUTPUT
          fi

      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: QEMU 설정 (arm64 크로스 빌드용)
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: 이미지 빌드 & 푸시
        uses: docker/build-push-action@v6
        with:
          # context를 루트('.')로 설정 — shared/** 공통 모듈을 Docker 빌드 시 참조하기 위함
          context: .
          file: backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ steps.config.outputs.tag_prefix }}-${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:${{ steps.config.outputs.tag_prefix }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: OCI 배포 및 헬스체크 (SSH 통합)
        uses: appleboy/ssh-action@v1
        env:
          NEW_TAG: "${{ steps.config.outputs.tag_prefix }}-${{ github.sha }}"
          GHCR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GHCR_USER: "${{ github.actor }}"
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: NEW_TAG,GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail

            # GHCR 인증 — 서버에서 private 이미지 pull 권한 획득
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            cd ${{ secrets.OCI_DEPLOY_PATH }}
            cd ..

            # 푸시가 일어난 브랜치로 강제 전환 및 최신 코드 다운로드
            TARGET_BRANCH="${{ github.ref_name }}"
            git fetch origin
            git checkout -f $TARGET_BRANCH
            git pull origin $TARGET_BRANCH

            cd ${{ secrets.OCI_DEPLOY_PATH }}

            # 기존 실행 중인 컨테이너의 이미지 태그 백업
            PREV_TAG=$(docker compose -f docker-compose.yml ps -q ${{ steps.config.outputs.service }} 2>/dev/null \
              | xargs -I{} docker inspect --format='{{index .Config.Image}}' {} 2>/dev/null \
              | grep -oP '(?<=:)[^:]+$' || echo "${{ steps.config.outputs.tag_prefix }}-latest")
            echo $PREV_TAG > .prev_backend_tag_${{ steps.config.outputs.env }}
            echo "백업된 이전 태그: $PREV_TAG"

            # 배포 환경에 맞는 compose 변수만 세팅 — 다른 환경 컨테이너는 건드리지 않음
            if [ "${{ steps.config.outputs.env }}" == "stage" ]; then
              export STAGE_TAG=$NEW_TAG
            else
              export PROD_TAG=$NEW_TAG
            fi
            docker compose -f docker-compose.yml pull ${{ steps.config.outputs.service }}
            docker compose -f docker-compose.yml up -d ${{ steps.config.outputs.service }}

            # 로컬 -latest 캐시도 레지스트리와 동기화 — 사람이 태그 없이 수동으로
            # `docker compose up -d`를 실행해도 얼어붙은 옛날 이미지가 아닌 최신을 받도록
            docker pull ghcr.io/${{ github.repository }}/backend:${{ steps.config.outputs.tag_prefix }}-latest

            # nginx가 실행 중이 아니면 시작 (--no-recreate: 백엔드 컨테이너 재생성 방지)
            if ! docker compose -f docker-compose.yml ps nginx | grep -q "Up"; then
              echo "nginx 미실행 — 시작합니다"
              docker compose -f docker-compose.yml up -d --no-recreate nginx
            fi

            # 헬스체크 로직 — curl -sf는 완전 침묵이라 대기 중엔 로그에 아무것도 안 찍힘.
            # 매 시도마다 HTTP 상태를 출력하고, 실패 시 컨테이너 로그까지 남겨서
            # SSH로 안 들어가도 CD 로그만으로 원인이 보이게 함.
            echo "=== 헬스체크 시작 ==="
            ELAPSED=0
            until STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:${{ steps.config.outputs.port }}/actuator/health) && [ "$STATUS" == "200" ]; do
              echo "[${ELAPSED}s] 대기 중 — HTTP ${STATUS:-연결 실패}"
              sleep 3
              ELAPSED=$((ELAPSED + 3))
              if [ $ELAPSED -ge 120 ]; then
                echo "❌ 헬스체크 실패 — 마지막 응답: HTTP ${STATUS:-연결 실패}"
                echo "--- ${{ steps.config.outputs.service }} 최근 로그 ---"
                docker compose -f docker-compose.yml logs --tail=50 ${{ steps.config.outputs.service }}
                exit 1
              fi
            done
            echo "✅ 헬스체크 통과"

            rm -f .prev_backend_tag_${{ steps.config.outputs.env }}

      - name: 스모크 테스트
        # GH Actions 러너에서 OCI_HOST:포트로 직접 붙는 방식은 애초에 안 됨 — 8080/8081은
        # 보안 목록상 외부에 안 열려 있고 nginx(80/443)만 열려 있음(실측 확인). 헬스체크와
        # 동일하게 서버 안에서 SSH로 localhost를 찌른다.
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -euo pipefail
            BASE_URL="http://localhost:${{ steps.config.outputs.port }}"
            echo "=== 스모크 테스트 시작 ==="

            # 인증 없이 열려 있는 핵심 조회 엔드포인트만 대상 — 배포 직후 "떴다"가 아니라
            # "DB 연결·JPA·직렬화까지 실제로 동작한다"를 확인하는 게 목적. 각 모듈에서
            # 대표 엔드포인트 하나씩(멤버·운영진·피드·프로젝트).
            FAILED=0
            for path in /api/members /api/staff /api/posts /api/projects; do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$BASE_URL$path" || echo "000")
              if [ "$STATUS" == "200" ]; then
                echo "✅ [$path] HTTP $STATUS"
              else
                echo "❌ [$path] HTTP ${STATUS}"
                FAILED=1
              fi
            done

            if [ "$FAILED" == "1" ]; then
              echo "=== 스모크 테스트 실패 ==="
              exit 1
            fi
            echo "=== 스모크 테스트 완료 ==="

      - name: 롤백
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd ${{ secrets.OCI_DEPLOY_PATH }}

            if [ -f .prev_backend_tag_${{ steps.config.outputs.env }} ]; then
              PREV_TAG=$(cat .prev_backend_tag_${{ steps.config.outputs.env }})
              echo "❌ 배포 실패 — 기존 버전($PREV_TAG)으로 롤백을 시작합니다."

              if [ "${{ steps.config.outputs.env }}" == "stage" ]; then
                export STAGE_TAG=$PREV_TAG
              else
                export PROD_TAG=$PREV_TAG
              fi
              docker compose -f docker-compose.yml up -d ${{ steps.config.outputs.service }}
              rm -f .prev_backend_tag_${{ steps.config.outputs.env }}
              echo "✅ 롤백 완료: $PREV_TAG"
            else
              echo "⚠ 백업된 이전 태그 정보가 없어 롤백을 건너뜁니다."
            fi
