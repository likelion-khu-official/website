# 일반 사용자(익명 방문자)가 할 수 있는 것 — 기능 수준 Given-When-Then
# 범위: dev + 열린 PR(#120·#121·#123·#126)
# status: dev(지금 됨) · pr-###(머지 후) · spec-only(스펙만, 미구현)
# ※ 상세판(QA 케이스 78개: 에러·엣지·보안 갭)은 git 5457bc9 에 있음

meta:
  perspective: "비로그인 익명 방문자 (운영진·멤버 제외)"
  date: 2026-07-18

기능:

  둘러보기:
    - feature: "랜딩"
      status: dev
      given: "멋사가 궁금한 사람이"
      when: "사이트(/)에 들어오면"
      then: "소개·통계·세션·활동계획·프로젝트·운영진·블로그·모집을 한 페이지로 훑는다"
      note: "프로젝트·운영진·블로그 섹션은 아직 플레이스홀더"

    - feature: "블로그 목록"
      status: dev
      given: "게시된 글이 있을 때"
      when: "/blog 에 가면"
      then: "글 카드 목록을 페이지 넘기며 본다"

    - feature: "블로그 글 상세"
      status: dev
      given: "목록에서 글을 골라"
      when: "/blog/{slug} 를 열면"
      then: "본문과 댓글을 읽는다 (숨김·초안 글은 404)"

    - feature: "프로젝트 쇼케이스"
      status: spec-only
      given: "멋사가 뭘 만드는지 보고 싶을 때"
      when: "/projects 목록·상세를 열면"
      then: "프로젝트 카드와 상세(이미지·멤버·스택·GitHub 링크)를 본다"
      note: "공개 API는 PR #121 머지로 생김 — 화면은 미구현"

    - feature: "멤버 로스터"
      status: spec-only
      given: "누가 활동하는지 보고 싶을 때"
      when: "/members 를 열면"
      then: "멤버 카드(이름·역할·기수·이모지/사진)를 본다"
      note: "공개 API는 dev에 있음 — 화면은 미구현(디자인 #77)"

    - feature: "운영진 소개"
      status: spec-only
      given: "랜딩을 보다가"
      when: "운영진 섹션에 닿으면"
      then: "운영진 실명·직책·사진·소개를 본다"
      note: "BE #87 진행 — 현재는 플레이스홀더"

  참여하기:
    - feature: "익명 댓글"
      status: dev
      given: "글을 읽고 한마디 남기고 싶을 때"
      when: "닉네임(선택)과 내용(300자)을 적어 등록하면"
      then: "댓글이 바로 달린다 (로그인 불필요)"

    - feature: "모집 알림 신청"
      status: dev
      given: "평상시(모집 전) 방문해서"
      when: "랜딩 모집 섹션에 이메일을 남기면"
      then: "다음 모집 시작 때 알림을 받기로 등록된다"

    - feature: "모집 시작 안내 메일 수신"
      status: pr-126
      given: "알림을 신청해 뒀는데"
      when: "운영진이 모집을 열면"
      then: "'모집이 시작됐어요' 메일을 받는다"

    - feature: "지원폼 제출"
      status: spec-only
      given: "모집 기간에"
      when: "/apply 에서 공통·세션별 질문에 답하고 제출하면"
      then: "계정 없이 지원이 접수된다 ('접수됐어요' 안내)"
      note: "FE·BE 모두 미구현 (#125 대기)"

  경계: # 익명이 못 하는 것
    - feature: "회원가입"
      status: dev
      given: "익명 방문자는"
      when: "계정을 만들려 해도"
      then: "공개 가입 경로가 없다 (계정은 관리자 등록·초대 전용)"

    - feature: "멤버·어드민 영역"
      status: dev
      given: "익명 상태로"
      when: "/admin 등 보호 영역·API에 접근하면"
      then: "로그인으로 리다이렉트되거나 401 — 보호 콘텐츠는 보이지 않는다"

    - feature: "글쓰기·프로필·프로젝트 등록"
      status: dev
      given: "익명 방문자는"
      when: "쓰기 행위를 하려면"
      then: "댓글·지원·알림 신청 외 전부 로그인이 필요하다"
