<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>모집이 시작됐어요</title>
</head>
<body style="font-family: 'Apple SD Gothic Neo', sans-serif; line-height: 1.6; color: #222;">
    <h2>멋쟁이사자처럼 경희대 모집이 시작됐어요!</h2>
    <p>모집 알림을 신청해주셔서 감사해요. 지금 지원할 수 있어요.</p>
    <p>
        <a th:href="${siteUrl}" th:text="${siteUrl}"
           style="display:inline-block; padding:10px 16px; background:#111; color:#fff; text-decoration:none; border-radius:6px;">
            지원하러 가기
        </a>
    </p>
    <p style="color:#888; font-size:12px;">더 이상 모집 알림을 받고 싶지 않다면 이 메일을 무시해주세요.</p>
</body>
</html>
