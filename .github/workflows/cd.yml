name: CD

on:
  push:
    branches: [dev, main]
    paths:
      - 'backend/**'
      - 'shared/**'
  workflow_dispatch:
    inputs:
      environment:
        description: '배포 환경 (stage / prod)'
        required: true
        default: 'stage'
        type: choice
        options: [stage, prod]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 환경 설정
        id: config
        run: |
          # workflow_dispatch 수동 실행 시 input 우선, push 시 브랜치로 판별
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref_name }}" == "main" ]; then
            ENV="prod"
          else
            ENV="stage"
          fi

          if [ "$ENV" == "prod" ]; then
            echo "env=prod"              >> $GITHUB_OUTPUT
            echo "tag_prefix=prod"       >> $GITHUB_OUTPUT
            echo "service=backend-prod"  >> $GITHUB_OUTPUT
            echo "port=8080"             >> $GITHUB_OUTPUT
          else
            echo "env=stage"             >> $GITHUB_OUTPUT
            echo "tag_prefix=stage"      >> $GITHUB_OUTPUT
            echo "service=backend-stage" >> $GITHUB_OUTPUT
            echo "port=8081"             >> $GITHUB_OUTPUT
          fi

      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: QEMU 설정 (arm64 크로스 빌드용)
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: 이미지 빌드 & 푸시
        uses: docker/build-push-action@v6
        with:
          # context를 루트('.')로 설정 — shared/** 공통 모듈을 Docker 빌드 시 참조하기 위함
          context: .
          file: backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ steps.config.outputs.tag_prefix }}-${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:${{ steps.config.outputs.tag_prefix }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: OCI 배포 및 헬스체크 (SSH 통합)
        uses: appleboy/ssh-action@v1
        env:
          NEW_TAG: "${{ steps.config.outputs.tag_prefix }}-${{ github.sha }}"
          GHCR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GHCR_USER: "${{ github.actor }}"
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: NEW_TAG,GHCR_TOKEN,GHCR_USER
          script: |
            # GHCR 인증 — 서버에서 private 이미지 pull 권한 획득
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            cd ${{ secrets.OCI_DEPLOY_PATH }}
            cd ..

            # 푸시가 일어난 브랜치로 강제 전환 및 최신 코드 다운로드
            TARGET_BRANCH="${{ github.ref_name }}"
            git fetch origin
            git checkout -f $TARGET_BRANCH
            git pull origin $TARGET_BRANCH

            cd ${{ secrets.OCI_DEPLOY_PATH }}

            # 기존 실행 중인 컨테이너의 이미지 태그 백업
            PREV_TAG=$(docker compose -f docker-compose.yml ps -q ${{ steps.config.outputs.service }} 2>/dev/null \
              | xargs -I{} docker inspect --format='{{index .Config.Image}}' {} 2>/dev/null \
              | grep -oP '(?<=:)[^:]+$' || echo "${{ steps.config.outputs.tag_prefix }}-latest")
            echo $PREV_TAG > .prev_backend_tag_${{ steps.config.outputs.env }}
            echo "백업된 이전 태그: $PREV_TAG"

            # 새 태그로 이미지 풀 및 서비스 재시작
            # BACKEND_TAG는 docker-compose.yml의 ${BACKEND_TAG:-...} 변수 치환에만 사용 (.env 파일 덮어쓰지 않음)
            export BACKEND_TAG=$NEW_TAG
            docker compose -f docker-compose.yml pull ${{ steps.config.outputs.service }}
            docker compose -f docker-compose.yml up -d ${{ steps.config.outputs.service }}

            # 헬스체크 로직
            echo "=== 헬스체크 시작 ==="
            ELAPSED=0
            until curl -sf http://localhost:${{ steps.config.outputs.port }}/actuator/health; do
              sleep 3
              ELAPSED=$((ELAPSED + 3))
              if [ $ELAPSED -ge 120 ]; then
                echo "❌ 헬스체크 실패"
                exit 1
              fi
            done
            echo "✅ 헬스체크 통과"

            rm -f .prev_backend_tag_${{ steps.config.outputs.env }}

      - name: 스모크 테스트
        run: |
          BASE_URL="http://${{ secrets.OCI_HOST }}:${{ steps.config.outputs.port }}"
          echo "=== 스모크 테스트 시작 ==="
          # 엔드포인트 구현 후 아래에 추가
          # curl -sf "$BASE_URL/api/..." && echo "✅ [엔드포인트]" || { echo "❌ [엔드포인트]"; exit 1; }
          echo "=== 스모크 테스트 완료 ==="

      - name: 롤백
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd ${{ secrets.OCI_DEPLOY_PATH }}

            if [ -f .prev_backend_tag_${{ steps.config.outputs.env }} ]; then
              PREV_TAG=$(cat .prev_backend_tag_${{ steps.config.outputs.env }})
              echo "❌ 배포 실패 — 기존 버전($PREV_TAG)으로 롤백을 시작합니다."

              export BACKEND_TAG=$PREV_TAG
              docker compose -f docker-compose.yml up -d ${{ steps.config.outputs.service }}
              rm -f .prev_backend_tag_${{ steps.config.outputs.env }}
              echo "✅ 롤백 완료: $PREV_TAG"
            else
              echo "⚠ 백업된 이전 태그 정보가 없어 롤백을 건너뜁니다."
            fi
