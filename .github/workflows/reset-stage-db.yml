name: Reset Stage DB

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '"RESET" 입력 시 실행 (stage.db 삭제 후 빈 스키마로 재생성)'
        required: true
        default: ''

jobs:
  reset:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'RESET' }}
    steps:
      - name: Stage DB 초기화
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd ${{ secrets.OCI_DEPLOY_PATH }}

            echo "=== Stage DB 초기화 시작 ==="
            docker compose -f docker-compose.yml stop backend-stage
            rm -f data/stage.db
            echo "stage.db 삭제 완료"
            docker compose -f docker-compose.yml start backend-stage

            echo "=== 헬스체크 ==="
            ELAPSED=0
            until curl -sf http://localhost:8081/actuator/health; do
              sleep 3
              ELAPSED=$((ELAPSED + 3))
              if [ $ELAPSED -ge 120 ]; then
                echo "❌ 헬스체크 실패 — Flyway 마이그레이션 로그 확인 필요"
                docker compose -f docker-compose.yml logs --tail=50 backend-stage
                exit 1
              fi
            done
            echo "✅ Stage DB 초기화 완료 (빈 스키마로 재생성됨)"
