<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>운영진 초대</title>
</head>
<body style="font-family: 'Apple SD Gothic Neo', sans-serif; line-height: 1.6; color: #222;">
    <h2>멋쟁이사자처럼 경희대 운영진 초대</h2>
    <p>안녕하세요, 멋쟁이사자처럼 경희대 운영진으로 초대되었어요.</p>
    <p>아래 링크에서 비밀번호와 이름을 정하면 가입이 끝나요.</p>
    <p>
        <a th:href="${inviteUrl}" th:text="${inviteUrl}"
           style="display:inline-block; padding:10px 16px; background:#111; color:#fff; text-decoration:none; border-radius:6px;">
            초대 링크
        </a>
    </p>
    <p>이 링크는 <strong th:text="${expiresAt}">만료 시각</strong>까지만 유효해요.</p>
    <p style="color:#888; font-size:12px;">본인이 요청하지 않은 초대라면 이 메일을 무시해주세요.</p>
</body>
</html>
