name: CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'backend/**'
      - 'shared/**'
      - 'frontend/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 세팅
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle 세팅
        uses: gradle/actions/setup-gradle@v4

      - name: 빌드 + 테스트 (임시 생략)
        run: |
          echo "현재 백엔드/프론트엔드 개발 코드가 없어 빌드를 임시 통과시킵니다."
          echo "개발 및 테스트 코드 작성 후 이 단계를 원상복구 하세요."

      # 개발이 완료되면 위의 '임시 생략' Step을 지우고, 아래 블록의 맨 앞 '#'만 모두 지워서 활성화하세요.
      # - name: 빌드 + 테스트
      #   working-directory: backend
      #   run: |
      #     chmod +x gradlew
      #     ./gradlew compileJava test

      - name: PR 코멘트
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ job.status }}' === 'success';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const note = '> 이 빌드는 현재 브랜치를 머지 대상 브랜치와 합친 상태에서 돌린 결과입니다.';
            const body = success
              ? `✅ **빌드 통합 성공**\n\n리뷰어 중 한 명이 승인하면 머지할 수 있습니다.\n\n${note}`
              : `❌ **빌드 통합 실패**\n\n머지 대상 브랜치와 합치는 과정에서 빌드가 실패해 머지할 수 없습니다. [로그](${runUrl})를 확인하고 수정 후 다시 푸시해주세요.\n\n${note}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
