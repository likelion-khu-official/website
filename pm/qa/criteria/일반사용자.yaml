# =============================================================================
# 일반 사용자(익명 방문자) Given-When-Then — 성공 기준
# =============================================================================
# 관점: 운영진·멤버를 제외한 비로그인 익명 방문자.
#       접점 = 공개 화면(브라우저) + 공개 API(직접 호출) + (구독자일 때) 안내 메일.
#
# 이 파일은 "성공 기준"만 담는다 — given/when/then = 기대 동작. 커밋·PR에 안
# 묶인다. 스펙이 안 바뀌면 안 바뀐다. TDD의 테스트 코드에 해당.
#
# 실제로 지금 통과하는지(검증 결과)는 여기 없다 — pm/qa/verification/<node>.md
# 에 있다. 작성 규칙은 pm/qa/GUIDE.md. (성공 기준과 검증 결과를 한 파일에 섞지 않는다.)
#
# node = pm/features/의 어느 노드가 이 시나리오로 검증되는지. README 지도와의
#        연결점 — node 없는 시나리오는 meta.미매핑 참고.
#
# status — 이 시나리오를 "언제" 테스트할 수 있는가:
#   dev       — 지금 dev에서 테스트 가능
#   pr-###    — 해당 PR 머지 후 테스트 가능 (그 PR을 머지하는 미션이 status를
#               dev로 되돌리고, '머지 전 pass'였던 검증 결과를 not-run으로 되돌린다)
#   spec-only — 위키 스펙만 있고 미구현 (구현되면 status를 dev로 전환)
#
# then은 항상 "스펙이 기대하는 동작"이다 — 현재 동작(버그 포함)을 then에 적으면
# 버그가 기대값이 된다. given에 문서(트리) 서술을 넣지 않는다 — 기준은 동작이다.
# 보안성 갭은 재현 경로·엔드포인트를 이 파일에 적지 않는다(공개 레포) — pm/qa/GUIDE.md.
# =============================================================================

meta:
  perspective: "일반 사용자 = 비로그인 익명 방문자 (운영진·멤버 제외)"
  anonymous_can_do: # 위키 정본 기준 익명이 할 수 있는 것 전부
    - "공개 화면 열람 (랜딩·블로그·프로젝트·멤버)"
    - "블로그 익명 댓글 작성"
    - "모집 알림 신청"
    - "지원폼 제출 (spec-only — 미구현)"
  미매핑: # 트리에 대응 노드가 없어 node: null 인 시나리오들 — 새 노드 신설 여부는 PM 판단
    - "MEM-006 — Given 자체가 dev·PR 어디에도 재현 불가(멤버 소프트 딜리트 경로 없음). 경로가 생기면 노드 배정."
    - "SYS-001~006 — 라우팅 404·백엔드 장애·API 401 경계·swagger 노출·헬스체크·에러 스키마 혼재. 특정 기능 노드가 아니라 플랫폼 전역 관심사."

